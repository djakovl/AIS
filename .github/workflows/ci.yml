name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:

  # Auth Service (Go)
  auth-service:
    name: Auth Service — Lint, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/auth-service/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/auth-service

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Coverage report
        run: |
          if [ -f coverage.out ] && [ -s coverage.out ]; then
            go tool cover -func=coverage.out
          else
            echo "No test coverage data (no tests yet)"
          fi

  # Auth Service — Docker Build
  auth-service-docker:
    name: Auth Service — Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build ./backend/auth-service -t auth-service:ci

  # Gateway (Go)
  gateway:
    name: Gateway — Lint, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/gateway/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/gateway

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Coverage report
        run: |
          if [ -f coverage.out ] && [ -s coverage.out ]; then
            go tool cover -func=coverage.out
          else
            echo "No test coverage data (no tests yet)"
          fi

  # Gateway — Docker Build
  gateway-docker:
    name: Gateway — Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build ./backend/gateway -t gateway:ci

  # Task Service (Go)
  task-service:
    name: Task Service — Lint, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/task-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/task-service/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/task-service

      - name: Build
        run: go build .

      - name: Test
        run: go test ./... -v -count=1 -coverprofile=coverage.out || echo "No tests yet"

      - name: Coverage report
        run: |
          if [ -f coverage.out ] && [ -s coverage.out ]; then
            go tool cover -func=coverage.out
          else
            echo "No test coverage data (no tests yet)"
          fi

  # Task Service — Docker Build
  task-service-docker:
    name: Task Service — Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build ./backend/task-service -t task-service:ci

  # S3 Service (C++)
  s3-service:
    name: S3 Service — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libpq-dev libjsoncpp-dev uuid-dev git
      
      - name: Install Drogon
        run: |
          git clone https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          sudo make install -j$(nproc)
      
      - name: Build S3 Service
        working-directory: backend/s3-storage
        run: |
          mkdir -p build
          cd build
          cmake .. -DBUILD_TESTS=ON
          make -j$(nproc)
      
      - name: Test
        working-directory: backend/s3-storage/build
        run: ctest --output-on-failure || echo "No tests configured yet"

  # S3 Service — Docker Build
  s3-service-docker:
    name: S3 Service — Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build ./backend/s3-storage -t s3-service:ci

  # S3 Frontend (Node.js)
  s3-frontend:
    name: S3 Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/s3-storage
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build

  # S3 Frontend — Docker Build
  s3-frontend-docker:
    name: S3 Frontend — Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build ./frontend/s3-storage -t s3-frontend:ci

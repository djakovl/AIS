name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:

  # ─── Auth Service (Go) ────────────────────────────────────────
  auth-service:
    name: Auth Service — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/auth-service/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

  # ─── Gateway (Go) ─────────────────────────────────────────────
  gateway:
    name: Gateway — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/gateway/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

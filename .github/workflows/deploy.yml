script: |
  cd ~/ais

  echo "=== git pull ==="
  git pull origin prod

  echo "=== auth-service ==="
  docker-compose up -d --build --no-deps auth-service

  echo "=== gateway ==="
  docker-compose up -d --build --no-deps gateway

  echo "=== auth-frontend ==="
  docker-compose up -d --build --no-deps auth-frontend

  echo "=== nginx ==="
  docker-compose up -d --no-deps nginx

  echo "=== Done ==="
  docker-compose ps

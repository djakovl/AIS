user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 65;

    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
    limit_req_status 429;

    # ── Разрешённые CORS-источники ────────────────────────────────────
    # Замените на реальный домен когда появится
    map $http_origin $cors_origin {
        default                  "";
        "http://localhost:5173"  $http_origin;
        "http://localhost:3000"  $http_origin;
        "http://localhost:8036"  $http_origin;
    }

    # ── Upstreams ────────────────────────────────────────────────────────
    upstream gateway       { server gateway:8080; }
    upstream auth_frontend { server auth-frontend:80; }
    # upstream task_frontend { server task-frontend:80; }
    # upstream s3_frontend   { server s3-frontend:80; }

    server {
        listen 80;
        server_name localhost;

        # / → /auth-app/
        location = / { return 302 /auth-app/; }

        # ── Auth Frontend (Vanilla JS) ──────────────────────────────────
        location /auth-app/ {
            proxy_pass http://auth_frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Task Frontend (раскомментировать когда готово) ──────────────
        # location /task-app/ {
        #     proxy_pass http://task_frontend/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        # }

        # ── S3 Frontend (раскомментировать когда готово) ────────────────
        # location /s3-app/ {
        #     proxy_pass http://s3_frontend/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        # }

        # ── Health check ───────────────────────────────────────────────
        location = /health {
            proxy_pass http://gateway/health;
            proxy_http_version 1.1;
            access_log off;
        }

        # ── API → Gateway ────────────────────────────────────────────────
        location ~ ^/(auth|tasks|files)/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Content-Type, X-CSRF-Token, X-Session-Token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           '3600' always;

            if ($request_method = 'OPTIONS') { return 204; }
        }
    }
}

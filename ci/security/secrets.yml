.secrets:trufflehog:
  image:
    name: $TRUFFLEHOG_IMAGE
    entrypoint: [""]
  tags:
    - shared
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
  script:
    - echo "=== Запуск trufflehog ==="
    - |
      trufflehog filesystem . \
        --json \
        --no-update \
        --no-verification \
        > trufflehog-report.json 2> trufflehog-stderr.log || true
    - echo "=== Размер отчёта ==="
    - wc -l trufflehog-report.json || echo "Файл не создан"
    - echo "=== Первые строки отчёта (для отладки) ==="
    - head -3 trufflehog-report.json || true
    - echo "=== Сводка по находкам ==="
    - |
      # Каждая находка trufflehog в JSON-lines содержит поле DetectorName
      # Последняя строка — итоговая сводка, в ней DetectorName нет
      TOTAL=$(grep -c '"DetectorName"' trufflehog-report.json 2>/dev/null) || TOTAL=0
      VERIFIED=$(grep -c '"Verified":true' trufflehog-report.json 2>/dev/null) || VERIFIED=0
      UNVERIFIED=$((TOTAL - VERIFIED))

      echo "Всего находок:        $TOTAL"
      echo "Верифицированных:     $VERIFIED  (живые токены)"
      echo "Неверифицированных:   $UNVERIFIED  (похоже на секрет, но не проверено)"
    - echo "=== Применение политики ==="
    - |
      if [ "$SECRETS_FAIL_ON_VERIFIED" = "true" ] && [ "$VERIFIED" -gt 0 ]; then
        echo "Найдены верифицированные секреты — блокируем пайплайн"
        exit 1
      fi
      if [ "$SECRETS_FAIL_ON_UNVERIFIED" = "true" ] && [ "$UNVERIFIED" -gt 0 ]; then
        echo "Найдены неверифицированные секреты — блокируем пайплайн"
        exit 1
      fi
      echo "Политика пройдена"
  artifacts:
    paths:
      - trufflehog-report.json
    expire_in: 1 week
    when: always

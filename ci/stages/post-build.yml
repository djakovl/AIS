upload_to_dependencytrack:
  extends:
    - .curl_jq
    - .rules:on_mr
  stage: post-build
  needs:
    - job: generate_sbom
      artifacts: true
  script:
    - |
      curl -sf -X POST "${DEPENDENCYTRACK_URL}/api/v1/bom" -H "X-Api-Key: ${DEPENDENCYTRACK_API_KEY}" -F "project=${DEPENDENCYTRACK_PROJECT_UUID}" -F "bom=@sbom.cdx.json"
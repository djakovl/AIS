upload_to_dependencytrack:
  extends:
    - .curl_jq
    - .rules:on_mr
  stage: post-build
  needs:
    - job: generate_sbom
      artifacts: true
  script:
    - |
      curl -X POST "http://10.0.0.30:8081/api/v1/bom"   -H "X-API-Key: $DEPENDENCYTRACK_API_KEY"   -F "project=$DEPENDENCYTRACK_PROJECT_UUID"   -F "bom=@sbom.cdx.json"
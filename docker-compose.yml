version: '3.9'

services:
  #  INFRASTRUCTURE
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloud_user
      POSTGRES_PASSWORD: cloud_pass_2026
      POSTGRES_DB: cloud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud_user -d cloud_db"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - network

  #  BACKEND SERVICES
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      AUTH_SERVICE_URL: http://auth-service:3000
      TASK_SERVICE_URL: http://task-service:3003
      S3_SERVICE_URL: http://s3-service:3002
      SESSION_TTL: 1800
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: auth
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cloud_user
      DB_PASSWORD: cloud_pass_2026
      DB_NAME: cloud_db
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: your-super-secret-jwt-key-2026
      SESSION_TTL: 1800
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # task-service:
  #   build:
  #     context: ./backend/task-service
  #     dockerfile: Dockerfile
  #   container_name: tasks
  #   restart: unless-stopped
  #   environment:
  #     PORT: 3003
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_USER: cloud_user
  #     DB_PASSWORD: cloud_pass_2026
  #     DB_NAME: cloud_db
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - network

  # s3-service:
  #   build:
  #     context: ./backend/s3-service
  #     dockerfile: Dockerfile
  #   container_name: s3
  #   restart: unless-stopped
  #   environment:
  #     PORT: 3002
  #     DB_HOST: postgres
  #     STORAGE_PATH: /opt/storage    # локально, без MinIO
  #   volumes:
  #     - storage-data:/opt/storage
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - network

  #  FRONTENDS 

  auth-frontend:
    image: nginx:1.25-alpine
    container_name: auth-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/auth-service:/usr/share/nginx/html:ro
    networks:
      - network

  # task-frontend:                          # Vue 3 + TypeScript
  #   build:
  #     context: ./frontend/task-service
  #     dockerfile: Dockerfile              # multi-stage: node → nginx
  #   container_name: task-frontend
  #   restart: unless-stopped
  #   networks:
  #     - network

  # s3-frontend:                            # React + TypeScript
  #   build:
  #     context: ./frontend/s3-service
  #     dockerfile: Dockerfile              # multi-stage: node → nginx
  #   container_name: s3-frontend
  #   restart: unless-stopped
  #   networks:
  #     - network

  #  NGINX — единая точка входа

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8036:80"
      - "8037:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
      - auth-frontend
    networks:
      - network

volumes:
  redis-data:
  postgres-data:
  storage-data:

networks:
  network:
    driver: bridge

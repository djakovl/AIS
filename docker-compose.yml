services:
  #  INFRASTRUCTURE
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - network

  #  BACKEND SERVICES
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      AUTH_SERVICE_URL: http://auth-service:3000
      TASK_SERVICE_URL: http://task-service:3003
      S3_SERVICE_URL: http://s3-service:3002
      SESSION_TTL: ${SESSION_TTL:-1800}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: auth
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET}
      SESSION_TTL: ${SESSION_TTL:-1800}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  task-service:
    build:
      context: ./backend/task-service
      dockerfile: Dockerfile
    container_name: task
    restart: unless-stopped
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  s3-service:
    build:
      context: ./backend/s3-storage
      dockerfile: Dockerfile
    container_name: s3
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      STORAGE_PATH: /opt/storage
    volumes:
      - storage-data:/opt/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  #  FRONTENDS

  auth-frontend:
    image: nginx:1.25-alpine
    container_name: auth-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/auth-service:/usr/share/nginx/html:ro
    networks:
      - network

  task-frontend:
    build:
      context: ./frontend/task-frontend
      dockerfile: Dockerfile
    container_name: task-frontend
    restart: unless-stopped
    networks:
      - network

  s3-frontend:
    build:
      context: ./frontend/s3-storage
      dockerfile: Dockerfile
    container_name: s3-frontend
    restart: unless-stopped
    networks:
      - network

  #  NGINX — единая точка входа

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8036:80"
      - "8037:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
      - auth-frontend
      - task-frontend
      - s3-frontend
    networks:
      - network

volumes:
  redis-data:
  postgres-data:
  storage-data:

networks:
  network:
    driver: bridge

version: '3.9'

services:
  # Redis — хранилище сессий
  redis:
    image: redis:7.2-alpine
    container_name: cloud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cloud-network

  # PostgreSQL — общая БД для всех сервисов
  postgres:
    image: postgres:16-alpine
    container_name: cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloud_user
      POSTGRES_PASSWORD: cloud_pass_2026
      POSTGRES_DB: cloud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud_user -d cloud_db"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cloud-network

  # MinIO — S3-совместимое хранилище файлов
  minio:
    image: minio/minio:latest
    container_name: cloud-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cloud-network

  # Gateway
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: cloud-gateway
    restart: unless-stopped
    environment:
      PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      AUTH_SERVICE_URL: http://auth-service:3000
      TASK_SERVICE_URL: http://task-service:3003
      S3_SERVICE_URL: http://s3-service:3002
      SESSION_TTL: 1800
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cloud-network

  # Auth Service
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: cloud-auth
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cloud_user
      DB_PASSWORD: cloud_pass_2026
      DB_NAME: cloud_db
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: your-super-secret-jwt-key-2026
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud-network

  # Task Service
  task-service:
    build:
      context: ./backend/task-service
      dockerfile: Dockerfile
    container_name: cloud-tasks
    restart: unless-stopped
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cloud_user
      DB_PASSWORD: cloud_pass_2026
      DB_NAME: cloud_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloud-network

  # S3 Service
  s3-service:
    build:
      context: ./backend/s3-service
      dockerfile: Dockerfile
    container_name: cloud-s3
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cloud_user
      DB_PASSWORD: cloud_pass_2026
      DB_NAME: cloud_db
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cloud-network

  # Nginx — точка входа для клиентов
  nginx:
    image: nginx:1.25-alpine
    container_name: cloud-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - cloud-network

volumes:
  redis-data:
  postgres-data:
  minio-data:

networks:
  cloud-network:
    driver: bridge

rules:
  - id: go-hardcoded-secret-2
    languages: [go]
    severity: ERROR
    message: Хардкоженный секрет/ключ в коде. Выносите в переменные окружения.
    patterns:
      - pattern: $KEY := "$VALUE"
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i)(secret|password|token|apikey|api_key|jwt|passwd|auth_key|private_key)'
      - metavariable-regex:
          metavariable: $VALUE
          regex: '^(?!.*\b(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|INTO|VALUES|RETURNING)\b).{8,}$'
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2025"
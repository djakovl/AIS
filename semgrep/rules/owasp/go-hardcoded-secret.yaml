rules:
  - id: go-hardcoded-secret
    languages: [go]
    severity: ERROR
    message: Хардкоженный секрет/ключ в коде. Выносите в переменные окружения.
    pattern-either:
      - pattern: $KEY := "..."
      - pattern: os.Getenv("...") == "..."
    metavariable-regex:
      metavariable: $KEY
      regex: '(?i)(secret|password|token|apikey|api_key|jwt)'
    metadata:
      cwe: "CWE-798"
      owasp: "A02:2025"
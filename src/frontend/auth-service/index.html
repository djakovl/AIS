<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud App - Аутентификация</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .service-selector {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .service-selector h2 {
            margin-bottom: 30px;
            color: #333;
        }
        .service-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .service-card {
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .service-card h3 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .service-card p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }
        .service-card.s3 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .service-card.tasker {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-wrapper" id="authWrapper">
            <!-- Форма входа -->
            <div class="auth-form" id="loginForm">
                <h2>Вход в систему</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                    <p class="switch-form">
                        Нет аккаунта? <a href="#" id="showRegister">Зарегистрироваться</a>
                    </p>
                </form>
            </div>

            <!-- Форма регистрации -->
            <div class="auth-form hidden" id="registerForm">
                <h2>Регистрация</h2>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="regUsername">Имя пользователя</label>
                        <input type="text" id="regUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="regFirstName">Имя</label>
                        <input type="text" id="regFirstName" name="first_name">
                    </div>
                    <div class="form-group">
                        <label for="regLastName">Фамилия</label>
                        <input type="text" id="regLastName" name="last_name">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Пароль</label>
                        <input type="password" id="regPassword" name="password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="regPasswordConfirm">Подтвердите пароль</label>
                        <input type="password" id="regPasswordConfirm" name="password_confirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                    <p class="switch-form">
                        Уже есть аккаунт? <a href="#" id="showLogin">Войти</a>
                    </p>
                </form>
            </div>

            <!-- Выбор сервиса -->
            <div class="service-selector hidden" id="serviceSelector">
                <h2>Выберите сервис</h2>
                <div class="service-grid">
                    <a href="/s3-app/" class="service-card s3">
                        <h3>S3 Storage</h3>
                        <p>Файловое хранилище</p>
                    </a>
                    <a href="/tasks-app/" class="service-card tasker">
                        <h3>Tasker</h3>
                        <p>Управление задачами</p>
                    </a>
                </div>
                <div class="profile-info" style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 8px; text-align: left;">
                    <p style="margin: 5px 0;"><strong>Email:</strong> <span id="profileEmail"></span></p>
                    <p style="margin: 5px 0;"><strong>Имя пользователя:</strong> <span id="profileUsername"></span></p>
                </div>
                <button id="logoutBtn" class="btn btn-danger" style="margin-top: 20px;">Выйти</button>
            </div>
        </div>

        <!-- Уведомления -->
        <div id="notification" class="notification hidden"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

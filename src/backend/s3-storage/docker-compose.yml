services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"  # Host 5433 to avoid conflict with local PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5

  s3-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-/opt/storage}
      # PRODUCTION=true — отключает Swagger (для production)
      PRODUCTION: ${PRODUCTION:-}
      # For segfault reproduction: set DEBUG_S3_SESSION=3c330a to enable NDJSON trace to .debug/debug-3c330a.log
      DEBUG_S3_SESSION: ${DEBUG_S3_SESSION:-}
    volumes:
      - s3_storage:/opt/storage
      # Mount debug logs directory (accessible on host when DEBUG_S3_SESSION is set)
      - ./.debug:/app/.debug
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "80:80"

volumes:
  postgres_data:
  s3_storage:
